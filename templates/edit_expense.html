{% extends "base.html" %}

{% block title %}Edit expense — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Edit expense</h1>
            <p class="auth-subtitle">Update your transaction details</p>
        </div>

        <div class="auth-card">
            <form method="POST" action="{{ url_for('edit_expense', id=expense.id) }}">
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <div class="amount-input-wrapper">
                        <span class="currency-symbol">₹</span>
                        <input type="number" id="amount" name="amount"
                               class="form-input amount-input"
                               placeholder="0.00"
                               value="{{ expense.amount }}"
                               step="0.01" min="0.01" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input form-select" required>
                        <option value="" disabled>Select a category</option>
                        <option value="food" {% if expense.category == 'Food' %}selected{% endif %}>Food & Dining</option>
                        <option value="travel" {% if expense.category == 'Transport' %}selected{% endif %}>Travel & Transport</option>
                        <option value="bills" {% if expense.category == 'Bills' %}selected{% endif %}>Bills & Utilities</option>
                        <option value="shopping" {% if expense.category == 'Shopping' %}selected{% endif %}>Shopping</option>
                        <option value="entertainment" {% if expense.category == 'Entertainment' %}selected{% endif %}>Entertainment</option>
                        <option value="healthcare" {% if expense.category == 'Health' %}selected{% endif %}>Healthcare</option>
                        <option value="other" {% if expense.category == 'Other' %}selected{% endif %}>Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input"
                           value="{{ expense.date }}"
                           required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description"
                           class="form-input"
                           placeholder="What did you spend on?"
                           value="{{ expense.description or '' }}"
                           maxlength="200">
                </div>

                <button type="submit" class="btn-submit">Save changes</button>
            </form>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('dashboard') }}">← Back to dashboard</a>
        </p>

    </div>
</section>

{% endblock %}
