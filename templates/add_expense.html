{% extends "base.html" %}

{% block title %}Add expense — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Add expense</h1>
            <p class="auth-subtitle">Track where your money goes</p>
        </div>

        <div class="auth-card">
            <form method="POST" action="{{ url_for('add_expense') }}">
                <div class="form-group">
                    <label for="amount">Amount</label>
                    <div class="amount-input-wrapper">
                        <span class="currency-symbol">₹</span>
                        <input type="number" id="amount" name="amount"
                               class="form-input amount-input"
                               placeholder="0.00"
                               step="0.01" min="0.01" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input form-select" required>
                        <option value="" disabled selected>Select a category</option>
                        <option value="food">Food & Dining</option>
                        <option value="travel">Travel & Transport</option>
                        <option value="bills">Bills & Utilities</option>
                        <option value="shopping">Shopping</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="healthcare">Healthcare</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input"
                           required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description"
                           class="form-input"
                           placeholder="What did you spend on?"
                           maxlength="200">
                </div>

                <button type="submit" class="btn-submit">Add expense</button>
            </form>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('dashboard') }}">← Back to dashboard</a>
        </p>

    </div>
</section>

{% endblock %}
