{% extends "base.html" %}

{% block title %}Profile — Spendly{% endblock %}

{% block content %}
<section class="profile-page">
    <div class="profile-container">
        <div class="profile-header">
            <h1 class="profile-title">Profile</h1>
            <p class="profile-subtitle">Manage your account settings</p>
        </div>

        <div class="profile-grid">
            <div class="profile-card">
                <h2 class="profile-card-title">Account Information</h2>
                <div class="profile-info">
                    <div class="profile-field">
                        <span class="profile-label">Name</span>
                        <span class="profile-value">{{ user.name }}</span>
                    </div>
                    <div class="profile-field">
                        <span class="profile-label">Email</span>
                        <span class="profile-value">{{ user.email }}</span>
                    </div>
                    <div class="profile-field">
                        <span class="profile-label">Member since</span>
                        <span class="profile-value">{{ user.created_at }}</span>
                    </div>
                </div>
            </div>

            <div class="profile-forms">
                <div class="profile-card">
                    <h2 class="profile-card-title">Update Name</h2>
                    <form method="POST" action="{{ url_for('profile') }}">
                        <input type="hidden" name="action" value="update_name">
                        <div class="form-group">
                            <label for="name">Full name</label>
                            <input type="text" id="name" name="name"
                                   class="form-input" placeholder="Enter your name"
                                   value="{{ user.name }}" required>
                        </div>
                        <button type="submit" class="btn-submit">Save changes</button>
                    </form>
                </div>

                <div class="profile-card">
                    <h2 class="profile-card-title">Change Password</h2>
                    <form method="POST" action="{{ url_for('profile') }}">
                        <input type="hidden" name="action" value="change_password">
                        <div class="form-group">
                            <label for="current_password">Current password</label>
                            <input type="password" id="current_password" name="current_password"
                                   class="form-input" placeholder="Enter current password" required>
                        </div>
                        <div class="form-group">
                            <label for="new_password">New password</label>
                            <input type="password" id="new_password" name="new_password"
                                   class="form-input" placeholder="Enter new password" required>
                        </div>
                        <div class="form-group">
                            <label for="confirm_password">Confirm new password</label>
                            <input type="password" id="confirm_password" name="confirm_password"
                                   class="form-input" placeholder="Confirm new password" required>
                        </div>
                        <button type="submit" class="btn-submit">Update password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
